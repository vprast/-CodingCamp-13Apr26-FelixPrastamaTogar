<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense &amp; Budget Visualizer</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-wrapper">

    <!-- Storage Unavailable Banner -->
    <div
      id="storage-banner"
      class="storage-banner"
      role="alert"
      aria-hidden="true"
      aria-live="polite"
    >
      ⚠️ Storage unavailable — data will not be saved.
    </div>

    <!-- Header -->
    <header class="app-header" role="banner">
      <h1 class="app-header__title">💰 Expense &amp; Budget Visualizer</h1>
      <div id="theme-toggle-container" class="theme-toggle" aria-label="Theme toggle"></div>
    </header>

    <!-- Main Content -->
    <main class="app-main" id="app-main" role="main">

      <!-- Balance Display -->
      <section class="balance-section card" aria-labelledby="balance-heading">
        <h2 id="balance-heading" class="card__title">Current Balance</h2>
        <div id="balance-display-container" class="balance-display">
          <p class="balance-display__label">Total Spending</p>
          <p class="balance-display__amount" aria-live="polite" aria-atomic="true">$0.00</p>
        </div>
      </section>

      <!-- Transaction Form + Category Manager -->
      <section class="form-section card" aria-labelledby="form-heading">
        <h2 id="form-heading" class="card__title">Add Transaction</h2>
        <div id="transaction-form-container"></div>

        <hr style="border:none; border-top:1px solid var(--color-border); margin: var(--spacing-lg) 0;" />

        <h3 class="card__title" id="category-heading">Manage Categories</h3>
        <div id="category-manager-container" class="category-section" aria-labelledby="category-heading"></div>
      </section>

      <!-- Pie Chart -->
      <section class="chart-section card" aria-labelledby="chart-heading">
        <h2 id="chart-heading" class="card__title">Spending by Category</h2>
        <div id="pie-chart-container" class="pie-chart-container">
          <canvas
            id="pie-chart-canvas"
            class="pie-chart-canvas"
            width="280"
            height="280"
            role="img"
            aria-label="Pie chart showing spending by category"
          ></canvas>
          <div id="pie-chart-legend" class="pie-chart-legend" aria-label="Chart legend"></div>
        </div>
      </section>

      <!-- Transaction List -->
      <section class="list-section card" aria-labelledby="list-heading">
        <h2 id="list-heading" class="card__title">Transactions</h2>
        <div id="transaction-list-container">
          <ul
            id="transaction-list"
            class="transaction-list"
            aria-label="Transaction list"
            aria-live="polite"
          ></ul>
        </div>
      </section>

      <!-- Monthly Summary -->
      <section class="summary-section card" aria-labelledby="summary-heading">
        <h2 id="summary-heading" class="card__title">Monthly Summary</h2>
        <div id="monthly-summary-container"></div>
      </section>

    </main>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
